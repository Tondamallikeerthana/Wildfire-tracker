<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#071226" />
      <stop offset="100%" stop-color="#08121a" />
    </radialGradient>
    <radialGradient id="earthGrad" cx="40%" cy="45%">
      <stop offset="0%" stop-color="#6fd3ff" />
      <stop offset="45%" stop-color="#0ea5a5" />
      <stop offset="100%" stop-color="#013a5a" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- starry sky -->
  <rect width="100%" height="100%" fill="url(#sky)" />
  <g fill="white" opacity="0.08">
    <circle cx="80" cy="40" r="1.6" />
    <circle cx="200" cy="120" r="1.2" />
    <circle cx="320" cy="60" r="1" />
    <circle cx="480" cy="100" r="1.4" />
    <circle cx="720" cy="40" r="1" />
    <circle cx="900" cy="150" r="1.6" />
    <circle cx="1080" cy="90" r="1" />
    <circle cx="600" cy="24" r="1.2" />
    <circle cx="980" cy="40" r="1.2" />
  </g>

  <!-- Earth with subtle glow -->
  <g transform="translate(600,300)">
    <circle r="220" fill="url(#earthGrad)" filter="url(#glow)" />

    <!-- simplified continents (stylized) -->
    <path fill="#073b26" d="M-80,-60c30,-20 80,-18 120,-8c20,6 48,22 56,42c8,20 2,42 -18,54c-20,12 -60,18 -92,12c-32,-6 -70,-34 -86,-60c-16,-26 -6,-56 2,-72z" />
    <path fill="#063a5a" d="M40,20c18,-10 46,-8 70,2c12,6 22,16 24,30c2,14 -6,28 -20,36c-14,8 -36,10 -54,6c-18,-4 -38,-16 -46,-30c-8,-14 -2,-26 6,-40z" />

    <!-- thin orbit grid lines -->
    <g stroke="rgba(255,255,255,0.06)" stroke-width="1" fill="none">
      <circle r="220" />
      <circle r="160" />
      <path d="M-220,0 A220,220 0 0 1 220,0" />
      <path d="M0,-220 A220,220 0 0 0 0,220" />
    </g>

    <!-- subtle night lights on right side -->
    <g fill="rgba(255,180,80,0.18)">
      <circle cx="110" cy="-20" r="4" />
      <circle cx="120" cy="20" r="3" />
      <circle cx="90" cy="40" r="2.5" />
    </g>
  </g>

  <!-- lower subtle vignette -->
  <rect y="420" width="1200" height="180" fill="black" opacity="0.06" />

</svg>